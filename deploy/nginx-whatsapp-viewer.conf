# nginx reverse proxy tuned for very large (20 GB+) uploads.
# Copy to /etc/nginx/sites-available/whatsapp-viewer and symlink into sites-enabled.

server {
    listen 80;
    server_name _;            # replace with your domain, e.g. wa.example.com

    # --- Large upload settings (the important bit) ---
    client_max_body_size 0;          # 0 = no size limit (allow 20 GB+)
    client_body_timeout 3600s;       # allow up to 1h to receive the body
    keepalive_timeout 3600s;

    location / {
        proxy_pass http://127.0.0.1:8000;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Stream the upload straight to the app instead of buffering the whole
        # 20 GB file on disk first. Critical for large uploads + progress.
        proxy_request_buffering off;
        proxy_buffering         off;

        # Give the backend plenty of time to receive/serve large payloads.
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
        proxy_connect_timeout 75s;
    }
}
